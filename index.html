<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für Lena ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffcad4,#ffe5ec);
    font-family:Arial,sans-serif;
    overflow:hidden;
}

.card{
    background:white;
    padding:40px;
    border-radius:25px;
    text-align:center;
    max-width:500px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
    color:#ff4d88;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:20px;
    background:#ff4d88;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    transform:scale(1.05);
}

.heart{
    position:absolute;
    animation:float 5s linear forwards;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="card">
    <h1>🌸 Hallo Lena 🌸</h1>
    <p>
        Diese kleine Webseite wurde nur für dich erstellt. 💖
        <br><br>
        Ich hoffe, sie zaubert dir ein Lächeln ins Gesicht. ✨
    </p>

    <button onclick="showMessage()">
        Nachricht öffnen 💌
    </button>
</div>

<script>
function showMessage(){
    alert("Lena, du bist etwas ganz Besonderes ❤️");
}

function createHeart(){
    const heart = document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),5000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
