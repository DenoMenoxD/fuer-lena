<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für Lena</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    min-height:100vh;
    font-family: "Georgia", serif;
    background:
        linear-gradient(rgba(255,250,244,.88),rgba(255,250,244,.88)),
        radial-gradient(circle at 20% 20%,#f5c8d8,transparent 28%),
        radial-gradient(circle at 80% 70%,#ead7c8,transparent 30%),
        linear-gradient(135deg,#fffaf4,#f3e7dc);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:#2d2330;
}

.bg-text{
    position:fixed;
    font-size:120px;
    color:rgba(201,111,149,.06);
    font-style:italic;
    z-index:0;
}

.bg-text.one{top:8%;left:6%}
.bg-text.two{bottom:10%;right:7%}

.card{
    width:92%;
    max-width:620px;
    background:rgba(255,253,249,.96);
    border:1px solid #e8d2c4;
    border-radius:32px;
    padding:46px 38px;
    text-align:center;
    box-shadow:0 28px 70px rgba(70,45,35,.18);
    position:relative;
    z-index:2;
}

.cat{
    width:125px;
    height:105px;
    margin:0 auto 22px;
    position:relative;
    animation:softMove 3s ease-in-out infinite;
}

@keyframes softMove{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-5px)}
}

.face{
    width:108px;
    height:84px;
    background:#fff;
    border:2px solid #e7c4d3;
    border-radius:52% 52% 48% 48%;
    position:absolute;
    left:8px;
    top:22px;
    box-shadow:0 12px 28px rgba(80,50,60,.13);
}

.ear{
    width:40px;
    height:40px;
    background:#fff;
    border:2px solid #e7c4d3;
    position:absolute;
    top:8px;
    transform:rotate(45deg);
    border-radius:8px;
}

.ear.left{left:14px}
.ear.right{right:14px}

.eye{
    width:8px;
    height:14px;
    background:#332638;
    border-radius:50%;
    position:absolute;
    top:38px;
}

.eye.left{left:35px}
.eye.right{right:35px}

.nose{
    width:8px;
    height:6px;
    background:#c96f95;
    border-radius:50%;
    position:absolute;
    left:50px;
    top:54px;
}

.mouth{
    position:absolute;
    left:49px;
    top:60px;
    font-size:13px;
    color:#3d303f;
}

.bow{
    width:46px;
    height:30px;
    position:absolute;
    top:0;
    left:39px;
    z-index:4;
}

.bow:before,
.bow:after{
    content:"";
    width:25px;
    height:23px;
    background:#d988a8;
    position:absolute;
    border-radius:50% 50% 50% 12%;
    top:4px;
}

.bow:before{left:0;transform:rotate(32deg)}
.bow:after{right:0;transform:rotate(-32deg)}

.bow span{
    width:12px;
    height:12px;
    background:#c96f95;
    border-radius:50%;
    position:absolute;
    left:17px;
    top:10px;
    z-index:5;
}

h1{
    font-size:38px;
    margin:0 0 18px;
    font-weight:normal;
    letter-spacing:.4px;
}

p{
    font-size:19px;
    line-height:1.65;
    margin:0 auto 18px;
    max-width:500px;
    color:#4d414f;
}

.signature{
    margin-top:18px;
    font-size:15px;
    color:#9b7c87;
    font-style:italic;
}

.screen{display:none}
.screen.active{display:block}

button{
    margin-top:20px;
    border:none;
    border-radius:999px;
    padding:14px 30px;
    font-size:16px;
    cursor:pointer;
    transition:.25s ease;
    font-family:Arial, sans-serif;
}

.primary{
    background:#2f2530;
    color:white;
}

.primary:hover{
    transform:translateY(-2px);
    box-shadow:0 14px 28px rgba(47,37,48,.18);
}

.secondary{
    background:#f8edf1;
    color:#8b4f66;
    border:1px solid #e8c9d8;
    position:relative;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    min-height:95px;
    position:relative;
}

.result{
    display:none;
    margin-top:26px;
    padding:22px;
    border-radius:22px;
    background:#f8edf1;
    border:1px solid #e8c9d8;
    color:#5f3e4b;
    font-size:19px;
    line-height:1.6;
}

.invite{
    margin-top:14px;
    padding:16px;
    border-radius:18px;
    background:#fffaf4;
    border:1px solid #ead7c8;
}

.float{
    position:fixed;
    top:-30px;
    animation:fall linear forwards;
    z-index:1;
    opacity:.22;
}

.confetti{
    position:fixed;
    top:-20px;
    width:10px;
    height:14px;
    border-radius:3px;
    animation:confettiFall 3s linear forwards;
    z-index:99;
}

@keyframes fall{
    to{transform:translateY(110vh) rotate(360deg);opacity:0}
}

@keyframes confettiFall{
    to{transform:translateY(110vh) rotate(720deg);opacity:0}
}

@media(max-width:600px){
    .card{padding:36px 24px}
    h1{font-size:32px}
    p{font-size:17px}
    .bg-text{font-size:70px}
}
</style>
</head>

<body>

<div class="bg-text one">Paris</div>
<div class="bg-text two">Lena</div>

<div class="card">

    <div class="screen active" id="intro">
        <div class="cat">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="bow"><span></span></div>
            <div class="face">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="nose"></div>
                <div class="mouth">ω</div>
            </div>
        </div>

        <h1>Hey Lena</h1>

        <p>
            Deniz wollte dich nicht einfach nur mit einer normalen Nachricht fragen.
            Also hat er diese kleine Seite gemacht.
        </p>

        <p>
            Ein bisschen Katze, ein bisschen Paris — und eine ehrliche Frage.
        </p>

        <button class="primary" onclick="showQuestion()">Weiter</button>
    </div>

    <div class="screen" id="questionScreen">
        <h1>Also...</h1>

        <p>
            Hättest du Lust, am Dienstag mit Deniz Sushi essen zu gehen?
        </p>

        <div class="buttons">
            <button class="primary" onclick="sayYes()">Ja, gerne</button>
            <button class="secondary" id="maybeBtn" onmouseover="moveMaybe()" onclick="moveMaybe()">Vielleicht später</button>
        </div>

        <div class="result" id="result"></div>
    </div>

</div>

<script>
const maybeBtn = document.getElementById("maybeBtn");
let maybeCount = 0;

function showQuestion(){
    document.getElementById("intro").classList.remove("active");
    document.getElementById("questionScreen").classList.add("active");
}

function sayYes(){
    const result = document.getElementById("result");
    result.style.display = "block";
    result.innerHTML =
        "Das freut Deniz sehr. 😊" +
        "<div class='invite'>" +
        "<strong>Dienstag, 19:00 Uhr</strong><br>" +
        "Ankerpunkt in Leibnitz<br><br>" +
        "Sushi-Date ist offiziell reserviert im Kopf." +
        "</div>";

    maybeBtn.style.display = "none";
    launchConfetti();
}

function moveMaybe(){
    maybeCount++;

    const texts = [
        "Vielleicht später",
        "Sicher?",
        "Kurz überlegen?",
        "Die Katze schaut schon...",
        "Ich weich lieber aus"
    ];

    maybeBtn.innerText = texts[Math.min(maybeCount, texts.length - 1)];

    const x = Math.random() * 260 - 130;
    const y = Math.random() * 90 - 25;

    maybeBtn.style.transform = `translate(${x}px, ${y}px)`;

    if(maybeCount > 6){
        maybeBtn.style.opacity = "0.35";
    }
}

function launchConfetti(){
    const colors = ["#d988a8","#ead7c8","#2f2530","#f2b6cc","#c96f95"];

    for(let i=0;i<90;i++){
        setTimeout(()=>{
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.background = colors[Math.floor(Math.random()*colors.length)];
            confetti.style.animationDuration = (Math.random()*1.5+2.2) + "s";
            document.body.appendChild(confetti);
            setTimeout(()=>confetti.remove(),3500);
        }, i * 12);
    }
}

function createFloat(){
    const item = document.createElement("div");
    item.className = "float";
    item.innerHTML = ["🐾","🎀","♡"][Math.floor(Math.random()*3)];
    item.style.left = Math.random()*100 + "vw";
    item.style.fontSize = (Math.random()*12+16) + "px";
    item.style.animationDuration = (Math.random()*4+7) + "s";
    document.body.appendChild(item);
    setTimeout(()=>item.remove(),11000);
}

setInterval(createFloat,1100);
</script>

</body>
</html>
