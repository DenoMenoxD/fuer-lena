<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für Lena 💖</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    min-height:100vh;
    font-family:Arial, sans-serif;
    background:radial-gradient(circle at top,#ffe1f0,#ff9ecb,#8b5cf6);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    width:90%;
    max-width:520px;
    background:rgba(255,255,255,0.92);
    border-radius:35px;
    padding:35px;
    text-align:center;
    box-shadow:0 25px 60px rgba(0,0,0,0.25);
    position:relative;
    z-index:2;
}

h1{
    color:#ff3d8b;
    font-size:38px;
    margin-bottom:10px;
}

.subtitle{
    font-size:18px;
    color:#555;
    line-height:1.6;
}

.question{
    margin-top:25px;
    font-size:24px;
    font-weight:bold;
    color:#7c3aed;
}

.buttons{
    margin-top:30px;
    height:90px;
    position:relative;
}

button{
    border:none;
    padding:15px 28px;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
    transition:0.25s;
}

#yes{
    background:#ff3d8b;
    color:white;
    box-shadow:0 8px 20px rgba(255,61,139,0.4);
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:white;
    color:#ff3d8b;
    border:2px solid #ff3d8b;
    position:absolute;
    left:55%;
    top:0;
}

.result{
    display:none;
    margin-top:25px;
    padding:20px;
    border-radius:25px;
    background:#ffe4f1;
    color:#ff2f86;
    font-size:22px;
    font-weight:bold;
}

.heart{
    position:absolute;
    animation:float 6s linear forwards;
    z-index:1;
}

@keyframes float{
    from{transform:translateY(110vh) rotate(0deg);opacity:1}
    to{transform:translateY(-120px) rotate(360deg);opacity:0}
}

.sparkle{
    position:absolute;
    color:white;
    animation:blink 2s infinite alternate;
}

@keyframes blink{
    from{opacity:.2;transform:scale(.8)}
    to{opacity:1;transform:scale(1.3)}
}
</style>
</head>

<body>

<div class="card">
    <h1>Hey Lena 🌸</h1>

    <p class="subtitle">
        Ich habe diese kleine Seite nur für dich gemacht.  
        Weil du süß bist und weil ich dich gerne zum Lächeln bringen wollte. 💖
    </p>

    <div class="question">
        Willst du am Dienstag mit mir Sushi essen gehen? 🍣✨
    </div>

    <div class="buttons">
        <button id="yes" onclick="sayYes()">Ja 💕</button>
        <button id="no" onmouseover="moveNo()" onclick="moveNo()">Nein 🙈</button>
    </div>

    <div class="result" id="result">
        Jaaaa! 😍 Dann ist Dienstag offiziell Sushi-Date-Tag 🍣💖
    </div>
</div>

<script>
const noBtn = document.getElementById("no");

function sayYes(){
    document.getElementById("result").style.display = "block";
    document.querySelector(".question").innerHTML = "Beste Entscheidung des Tages 😌🍣";
}

function moveNo(){
    const x = Math.random() * 260 - 120;
    const y = Math.random() * 80 + 5;

    noBtn.style.left = "50%";
    noBtn.style.top = y + "px";
    noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

function createHeart(){
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = ["💖","💕","🌸","✨","🍣"][Math.floor(Math.random()*5)];
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (Math.random()*24+18) + "px";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),6000);
}

function createSparkle(){
    const s = document.createElement("div");
    s.className = "sparkle";
    s.innerHTML = "✨";
    s.style.left = Math.random()*100 + "vw";
    s.style.top = Math.random()*100 + "vh";
    s.style.fontSize = (Math.random()*18+12) + "px";
    document.body.appendChild(s);

    setTimeout(()=>s.remove(),3000);
}

setInterval(createHeart,300);
setInterval(createSparkle,700);
</script>

</body>
</html>
