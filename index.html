<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für Lena</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    min-height:100vh;
    font-family: Georgia, "Times New Roman", serif;
    background:linear-gradient(135deg,#f6efe6,#fffaf4);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:#2f2530;
}

body:before{
    content:"";
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 15% 20%,rgba(217,136,168,.18),transparent 18%),
      radial-gradient(circle at 85% 15%,rgba(234,215,200,.35),transparent 20%),
      radial-gradient(circle at 80% 85%,rgba(217,136,168,.14),transparent 20%);
    z-index:0;
}

.card{
    width:92%;
    max-width:590px;
    background:#fffdf9;
    border:1px solid #ead7c8;
    border-radius:30px;
    padding:42px 34px;
    text-align:center;
    box-shadow:0 25px 60px rgba(70,45,35,0.16);
    position:relative;
    z-index:2;
}

.cat-row{
    display:flex;
    justify-content:center;
    gap:18px;
    margin-bottom:22px;
}

.cat{
    width:90px;
    height:82px;
    position:relative;
}

.cat.big{
    width:122px;
    height:105px;
}

.face{
    width:78px;
    height:62px;
    background:#fff;
    border:2px solid #e8c9d8;
    border-radius:52% 52% 48% 48%;
    position:absolute;
    left:6px;
    top:18px;
    box-shadow:0 10px 22px rgba(80,50,60,.12);
}

.big .face{
    width:105px;
    height:82px;
    left:7px;
    top:22px;
}

.ear{
    width:30px;
    height:30px;
    background:#fff;
    border:2px solid #e8c9d8;
    position:absolute;
    top:8px;
    transform:rotate(45deg);
    border-radius:7px;
}

.big .ear{
    width:38px;
    height:38px;
}

.ear.left{left:12px}
.ear.right{right:12px}

.eye{
    width:7px;
    height:12px;
    background:#332638;
    border-radius:50%;
    position:absolute;
    top:29px;
}

.big .eye{
    width:8px;
    height:14px;
    top:38px;
}

.eye.left{left:25px}
.eye.right{right:25px}

.big .eye.left{left:34px}
.big .eye.right{right:34px}

.nose{
    width:7px;
    height:5px;
    background:#d987a7;
    border-radius:50%;
    position:absolute;
    left:36px;
    top:42px;
}

.big .nose{
    width:8px;
    height:6px;
    left:48px;
    top:54px;
}

.mouth{
    position:absolute;
    left:35px;
    top:47px;
    font-size:12px;
    color:#3d303f;
}

.big .mouth{
    left:47px;
    top:60px;
    font-size:13px;
}

.bow{
    width:40px;
    height:28px;
    position:absolute;
    top:0;
    left:25px;
    z-index:4;
}

.big .bow{
    width:42px;
    left:39px;
}

.bow:before,
.bow:after{
    content:"";
    width:22px;
    height:20px;
    background:#d988a8;
    position:absolute;
    border-radius:50% 50% 50% 12%;
    top:4px;
}

.bow:before{left:0;transform:rotate(32deg)}
.bow:after{right:0;transform:rotate(-32deg)}

.bow span{
    width:11px;
    height:11px;
    background:#c96f95;
    border-radius:50%;
    position:absolute;
    left:14px;
    top:9px;
    z-index:5;
}

h1{
    font-size:34px;
    margin:0 0 18px;
    font-weight:normal;
    letter-spacing:.5px;
}

p{
    font-size:18px;
    line-height:1.65;
    margin:0 auto 18px;
    max-width:460px;
    color:#4d414f;
}

.small{
    font-size:14px;
    color:#9b7c87;
}

.screen{display:none}
.screen.active{display:block}

button{
    margin-top:18px;
    border:none;
    border-radius:999px;
    padding:13px 28px;
    font-size:16px;
    cursor:pointer;
    transition:.25s ease;
    font-family:Arial, sans-serif;
}

.primary{
    background:#2f2530;
    color:white;
}

.primary:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 24px rgba(47,37,48,.18);
}

.secondary{
    background:#f8edf1;
    color:#8b4f66;
    border:1px solid #e8c9d8;
    position:relative;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    min-height:95px;
    position:relative;
}

.result{
    display:none;
    margin-top:24px;
    padding:20px;
    border-radius:20px;
    background:#f8edf1;
    border:1px solid #e8c9d8;
    color:#5f3e4b;
    font-size:18px;
    line-height:1.6;
}

.float{
    position:fixed;
    top:-30px;
    animation:fall linear forwards;
    z-index:1;
    opacity:.32;
}

.confetti{
    position:fixed;
    top:-20px;
    width:10px;
    height:14px;
    border-radius:3px;
    animation:confettiFall 3s linear forwards;
    z-index:99;
}

@keyframes fall{
    to{transform:translateY(110vh) rotate(360deg);opacity:0}
}

@keyframes confettiFall{
    to{transform:translateY(110vh) rotate(720deg);opacity:0}
}

@media(max-width:600px){
    .card{padding:34px 22px}
    h1{font-size:30px}
    p{font-size:17px}
    .cat-row{gap:8px}
}
</style>
</head>

<body>

<div class="card">

    <div class="screen active" id="intro">
        <div class="cat-row">
            <div class="cat">
                <div class="ear left"></div><div class="ear right"></div>
                <div class="face"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth">ω</div></div>
            </div>

            <div class="cat big">
                <div class="ear left"></div><div class="ear right"></div>
                <div class="bow"><span></span></div>
                <div class="face"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth">ω</div></div>
            </div>

            <div class="cat">
                <div class="ear left"></div><div class="ear right"></div>
                <div class="face"><div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth">ω</div></div>
            </div>
        </div>

        <h1>Hey Lena</h1>

        <p>
            Die kleine Katzenrunde hat beschlossen, dass ich dich nicht einfach normal fragen darf.
        </p>

        <p class="small">Also kommt die Frage jetzt etwas stilvoller.</p>

        <button class="primary" onclick="showQuestion()">Weiter</button>
    </div>

    <div class="screen" id="questionScreen">
        <h1>Also...</h1>

        <p>
            Hättest du Lust, am Dienstag mit mir Sushi essen zu gehen?
        </p>

        <div class="buttons">
            <button class="primary" onclick="sayYes()">Ja, gerne</button>
            <button class="secondary" id="maybeBtn" onmouseover="moveMaybe()" onclick="moveMaybe()">Vielleicht später</button>
        </div>

        <div class="result" id="result"></div>
    </div>

</div>

<script>
const maybeBtn = document.getElementById("maybeBtn");
let maybeCount = 0;

function showQuestion(){
    document.getElementById("intro").classList.remove("active");
    document.getElementById("questionScreen").classList.add("active");
}

function sayYes(){
    const result = document.getElementById("result");
    result.style.display = "block";
    result.innerHTML =
        "Das freut mich sehr.<br><br>" +
        "<strong>Dienstag, 19:00 Uhr</strong><br>" +
        "Ankerpunkt in Leibnitz<br><br>" +
        "Die Katzenrunde ist zufrieden.";

    maybeBtn.style.display = "none";
    launchConfetti();
}

function moveMaybe(){
    maybeCount++;

    const texts = [
        "Vielleicht später",
        "Sicher?",
        "Die Katzen schauen schon...",
        "Wirklich?",
        "Ich weich lieber aus"
    ];

    maybeBtn.innerText = texts[Math.min(maybeCount, texts.length - 1)];

    const x = Math.random() * 260 - 130;
    const y = Math.random() * 90 - 25;

    maybeBtn.style.transform = `translate(${x}px, ${y}px)`;

    if(maybeCount > 6){
        maybeBtn.style.opacity = "0.35";
    }
}

function launchConfetti(){
    const colors = ["#d988a8","#ead7c8","#2f2530","#f2b6cc","#c96f95"];

    for(let i=0;i<90;i++){
        setTimeout(()=>{
            const confetti = document.createElement("div");
            confetti.className = "confetti";
            confetti.style.left = Math.random() * 100 + "vw";
            confetti.style.background = colors[Math.floor(Math.random()*colors.length)];
            confetti.style.animationDuration = (Math.random()*1.5+2.2) + "s";
            document.body.appendChild(confetti);
            setTimeout(()=>confetti.remove(),3500);
        }, i * 12);
    }
}

function createFloat(){
    const item = document.createElement("div");
    item.className = "float";
    item.innerHTML = ["🐾","🎀","🐱"][Math.floor(Math.random()*3)];
    item.style.left = Math.random()*100 + "vw";
    item.style.fontSize = (Math.random()*12+16) + "px";
    item.style.animationDuration = (Math.random()*4+6) + "s";
    document.body.appendChild(item);
    setTimeout(()=>item.remove(),10000);
}

setInterval(createFloat,900);
</script>

</body>
</html>
