<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für Lena</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    min-height:100vh;
    font-family: Georgia, "Times New Roman", serif;
    background:linear-gradient(135deg,#f7efe7,#fffaf5);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    color:#2f2530;
}

.card{
    width:92%;
    max-width:560px;
    background:#fffdf9;
    border:1px solid #ead7c8;
    border-radius:28px;
    padding:42px 34px;
    text-align:center;
    box-shadow:0 25px 60px rgba(70,45,35,0.16);
    position:relative;
    z-index:2;
}

.cat{
    width:120px;
    height:105px;
    margin:0 auto 24px;
    position:relative;
}

.face{
    width:105px;
    height:82px;
    background:#fff;
    border:2px solid #e8c9d8;
    border-radius:52% 52% 48% 48%;
    position:absolute;
    left:7px;
    top:22px;
    box-shadow:0 10px 25px rgba(80,50,60,.12);
}

.ear{
    width:38px;
    height:38px;
    background:#fff;
    border:2px solid #e8c9d8;
    position:absolute;
    top:8px;
    transform:rotate(45deg);
    border-radius:8px;
}

.ear.left{left:15px}
.ear.right{right:15px}

.eye{
    width:8px;
    height:14px;
    background:#332638;
    border-radius:50%;
    position:absolute;
    top:38px;
}

.eye.left{left:34px}
.eye.right{right:34px}

.nose{
    width:8px;
    height:6px;
    background:#d987a7;
    border-radius:50%;
    position:absolute;
    left:48px;
    top:54px;
}

.mouth{
    position:absolute;
    left:47px;
    top:60px;
    font-size:13px;
    color:#3d303f;
}

.bow{
    width:42px;
    height:28px;
    position:absolute;
    top:0;
    left:39px;
    z-index:4;
}

.bow:before,
.bow:after{
    content:"";
    width:24px;
    height:22px;
    background:#d988a8;
    position:absolute;
    border-radius:50% 50% 50% 12%;
    top:4px;
}

.bow:before{
    left:0;
    transform:rotate(32deg);
}

.bow:after{
    right:0;
    transform:rotate(-32deg);
}

.bow span{
    width:12px;
    height:12px;
    background:#c96f95;
    border-radius:50%;
    position:absolute;
    left:15px;
    top:9px;
    z-index:5;
}

h1{
    font-size:34px;
    margin:0 0 18px;
    font-weight:normal;
    letter-spacing:.5px;
}

p{
    font-size:18px;
    line-height:1.65;
    margin:0 auto 18px;
    max-width:440px;
    color:#4d414f;
}

.small{
    font-size:14px;
    color:#9b7c87;
    margin-top:8px;
}

.screen{
    display:none;
}

.screen.active{
    display:block;
}

button{
    margin-top:18px;
    border:none;
    border-radius:999px;
    padding:13px 28px;
    font-size:16px;
    cursor:pointer;
    transition:.25s ease;
    font-family:Arial, sans-serif;
}

.primary{
    background:#2f2530;
    color:white;
}

.primary:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 24px rgba(47,37,48,.18);
}

.secondary{
    background:#f8edf1;
    color:#8b4f66;
    border:1px solid #e8c9d8;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:14px;
    flex-wrap:wrap;
    margin-top:18px;
}

.result{
    display:none;
    margin-top:26px;
    padding:18px;
    border-radius:18px;
    background:#f8edf1;
    border:1px solid #e8c9d8;
    color:#5f3e4b;
    font-size:18px;
}

.paw{
    position:absolute;
    font-size:18px;
    color:#d988a8;
    opacity:.22;
    animation:float 7s linear forwards;
}

@keyframes float{
    from{transform:translateY(105vh);opacity:.22}
    to{transform:translateY(-80px);opacity:0}
}

@media(max-width:600px){
    .card{padding:34px 24px}
    h1{font-size:30px}
    p{font-size:17px}
}
</style>
</head>

<body>

<div class="card">

    <div class="screen active" id="intro">
        <div class="cat">
            <div class="ear left"></div>
            <div class="ear right"></div>
            <div class="bow"><span></span></div>
            <div class="face">
                <div class="eye left"></div>
                <div class="eye right"></div>
                <div class="nose"></div>
                <div class="mouth">ω</div>
            </div>
        </div>

        <h1>Hey Lena</h1>

        <p>
            Ich wollte dich etwas fragen, aber irgendwie war es schöner,
            daraus eine kleine Seite zu machen.
        </p>

        <p class="small">Ein bisschen Paris, ein bisschen Katze, aber nicht zu viel.</p>

        <button class="primary" onclick="showQuestion()">Weiter</button>
    </div>

    <div class="screen" id="questionScreen">
        <h1>Also...</h1>

        <p>
            Hättest du Lust, am Dienstag mit mir Sushi essen zu gehen?
        </p>

        <div class="buttons">
            <button class="primary" onclick="sayYes()">Ja, gerne</button>
            <button class="secondary" onclick="maybe()">Vielleicht später</button>
        </div>

        <div class="result" id="result"></div>
    </div>

</div>

<script>
function showQuestion(){
    document.getElementById("intro").classList.remove("active");
    document.getElementById("questionScreen").classList.add("active");
}

function sayYes(){
    const result = document.getElementById("result");
    result.style.display = "block";
    result.innerHTML = "Das freut mich sehr. Dann freue ich mich auf Dienstag.";
}

function maybe(){
    const result = document.getElementById("result");
    result.style.display = "block";
    result.innerHTML = "Okay, fair. Aber ich musste es wenigstens versuchen.";
}

function createPaw(){
    const paw = document.createElement("div");
    paw.className = "paw";
    paw.innerHTML = "🐾";
    paw.style.left = Math.random()*100 + "vw";
    paw.style.fontSize = (Math.random()*12+14) + "px";
    document.body.appendChild(paw);
    setTimeout(()=>paw.remove(),7000);
}

setInterval(createPaw,1200);
</script>

</body>
</html>
